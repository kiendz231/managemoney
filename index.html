<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description"
    content="Ứng dụng quản lý chi tiêu cá nhân thông minh. Theo dõi thu chi, đặt ngân sách, phân tích tài chính." />
  <meta name="theme-color" content="#0d0f14" />
  <title>Quản Lý Chi Tiêu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>" />
</head>

<body>
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
      <div class="login-bg">
        <div class="login-orb login-orb-1"></div>
        <div class="login-orb login-orb-2"></div>
        <div class="login-orb login-orb-3"></div>
      </div>
      <div class="login-container">
        <div class="login-card glass-card">
          <div class="login-logo">
            <span class="logo-icon">💰</span>
            <h1 class="logo-text">MM</h1>
            <p class="logo-subtitle">Quản lý chi tiêu thông minh</p>
          </div>
          <div id="login-form-container">
            <div class="login-tabs">
              <button class="login-tab active" data-tab="signin" id="tab-signin">Đăng nhập</button>
              <button class="login-tab" data-tab="signup" id="tab-signup">Đăng ký</button>
            </div>
            <form id="email-signin-form" class="auth-form">
              <div class="input-group">
                <label for="signin-email">Email</label>
                <input type="email" id="signin-email" placeholder="email@example.com" required autocomplete="email" />
              </div>
              <div class="input-group">
                <label for="signin-password">Mật khẩu</label>
                <input type="password" id="signin-password" placeholder="••••••••" required
                  autocomplete="current-password" />
              </div>
              <button type="submit" class="btn btn-primary btn-full" id="btn-email-signin">
                <span>Đăng nhập</span>
              </button>
            </form>
            <form id="email-signup-form" class="auth-form hidden">
              <div class="input-group">
                <label for="signup-name">Tên hiển thị</label>
                <input type="text" id="signup-name" placeholder="Tên của bạn" required autocomplete="name" />
              </div>
              <div class="input-group">
                <label for="signup-email">Email</label>
                <input type="email" id="signup-email" placeholder="email@example.com" required autocomplete="email" />
              </div>
              <div class="input-group">
                <label for="signup-password">Mật khẩu</label>
                <input type="password" id="signup-password" placeholder="Tối thiểu 6 ký tự" required minlength="6"
                  autocomplete="new-password" />
              </div>
              <button type="submit" class="btn btn-primary btn-full" id="btn-email-signup">
                <span>Tạo tài khoản</span>
              </button>
            </form>
            <div class="divider"><span>hoặc</span></div>
            <button class="btn btn-google btn-full" id="btn-google-signin">
              <svg viewBox="0 0 24 24" width="20" height="20">
                <path
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                  fill="#4285F4" />
                <path
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                  fill="#34A853" />
                <path
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                  fill="#FBBC05" />
                <path
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                  fill="#EA4335" />
              </svg>
              <span>Đăng nhập với Google</span>
            </button>
          </div>
          <div id="login-loading" class="login-loading hidden">
            <div class="spinner"></div>
            <p>Đang đăng nhập...</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Main App Shell -->
    <div id="main-app" class="screen">
      <!-- Sidebar (Desktop) -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-logo">💰</span>
          <span class="sidebar-brand">Manage Money</span>
        </div>
        <nav class="sidebar-nav">
          <a href="#dashboard" class="nav-item active" data-page="dashboard" id="nav-dashboard">
            <i data-lucide="layout-dashboard"></i>
            <span>Tổng quan</span>
          </a>
          <a href="#transactions" class="nav-item" data-page="transactions" id="nav-transactions">
            <i data-lucide="receipt"></i>
            <span>Giao dịch</span>
          </a>
          <a href="#installments" class="nav-item" data-page="installments" id="nav-installments">
            <i data-lucide="credit-card"></i>
            <span>Vay & Nợ</span>
          </a>
          <a href="#reports" class="nav-item" data-page="reports" id="nav-reports">
            <i data-lucide="bar-chart-3"></i>
            <span>Báo cáo</span>
          </a>
          <a href="#settings" class="nav-item" data-page="settings" id="nav-settings">
            <i data-lucide="settings"></i>
            <span>Cài đặt</span>
          </a>
        </nav>
        <div class="sidebar-footer">
          <div class="user-info" id="sidebar-user-info">
            <div class="user-avatar" id="sidebar-avatar">B</div>
            <div class="user-details">
              <span class="user-name" id="sidebar-username">User</span>
              <span class="user-email" id="sidebar-email">user@email.com</span>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Top bar -->
        <header class="topbar">
          <button class="topbar-menu-btn" id="btn-toggle-sidebar">
            <i data-lucide="menu"></i>
          </button>
          <h2 class="topbar-title" id="topbar-title">Tổng quan</h2>
          <div class="topbar-actions">
            <button class="btn btn-accent btn-sm" id="btn-add-transaction-topbar">
              <i data-lucide="plus"></i>
              <span>Thêm</span>
            </button>
          </div>
        </header>

        <!-- Page Container -->
        <div class="page-container" id="page-container">
          <!-- Pages will be rendered here dynamically -->
        </div>
      </main>

      <!-- Bottom Navigation (Mobile) -->
      <nav class="bottom-nav" id="bottom-nav">
        <div class="bottom-nav-indicator" id="bottom-nav-indicator"></div>
        <a href="#dashboard" class="bottom-nav-item active" data-page="dashboard" id="bnav-dashboard">
          <i data-lucide="layout-dashboard"></i>
          <span>Tổng quan</span>
        </a>
        <a href="#transactions" class="bottom-nav-item" data-page="transactions" id="bnav-transactions">
          <i data-lucide="receipt"></i>
          <span>Giao dịch</span>
        </a>
        <button class="bottom-nav-fab" id="btn-add-transaction-fab">
          <i data-lucide="plus"></i>
        </button>
        <a href="#installments" class="bottom-nav-item" data-page="installments" id="bnav-installments">
          <i data-lucide="credit-card"></i>
          <span>Vay & Nợ</span>
        </a>
        <a href="#reports" class="bottom-nav-item" data-page="reports" id="bnav-reports">
          <i data-lucide="bar-chart-3"></i>
          <span>Báo cáo</span>
        </a>
      </nav>

      <!-- FAB (Floating Action Button - Desktop) -->
      <button class="fab desktop-fab" id="btn-add-transaction-desktop-fab" aria-label="Thêm giao dịch">
        <i data-lucide="plus"></i>
      </button>
    </div>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal glass-card" id="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="modal-title">Modal</h3>
          <button class="modal-close" id="modal-close" aria-label="Đóng">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
